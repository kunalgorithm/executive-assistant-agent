<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>404 | Sayla</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        background: #0a0a0a;
        color: #fff;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        text-align: center;
        padding: 1.5rem;
      }
      .container {
        max-width: 400px;
      }
      h1 {
        font-size: 4rem;
        font-weight: 700;
        margin-bottom: 0.5rem;
        color: #fff;
      }
      p {
        font-size: 0.9375rem;
        color: #737373;
        line-height: 1.6;
        margin-bottom: 2rem;
      }
      a {
        display: inline-block;
        padding: 0.75rem 2rem;
        border-radius: 0.75rem;
        background: #fff;
        color: #000;
        font-size: 0.875rem;
        font-weight: 600;
        text-decoration: none;
        transition: background 0.2s;
      }
      a:hover {
        background: #e5e5e5;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <h1>404</h1>
      <p>this page doesn't exist.</p>
      <a href="/">go home</a>

  </body>
</html>
