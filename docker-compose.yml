services:
  postgres:
    image: pgvector/pgvector:pg17
    container_name: superconnector_postgres
    ports:
      - 5432:5432
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-postgres}
    volumes:
      - superconnector_pgdata:/var/lib/postgresql/data

volumes:
  superconnector_pgdata:
